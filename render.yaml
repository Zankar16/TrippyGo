services:
  # Backend API (Express + Prisma)
  - type: web
    name: trippygo-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trippygo-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false

  # Frontend (Vite + React)
  - type: static
    name: trippygo-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: trippygo-server
          type: web
          property: host

databases:
  - name: trippygo-db
    plan: free
